name: Generate README

on:
  push:
    branches: [main]
    paths:
      - readme.source.md
      - .github/workflows/readme-aura.yml
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate README
        uses: collectioneur/readme-aura@v1.0.13
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

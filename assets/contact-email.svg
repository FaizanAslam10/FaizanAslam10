<svg xmlns="http://www.w3.org/2000/svg" width="356" height="64" viewBox="0 0 356 64" role="img" aria-label="EMAIL m.faizanaslam10@gmail.com">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6" stop-opacity=".1"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f472b6" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="354" height="62" rx="18" fill="url(#bg)" stroke="url(#edge)" stroke-width="2"/>
  <rect x="18" y="14" width="36" height="36" rx="12" fill="#f472b6" fill-opacity=".13" stroke="#f472b6" stroke-opacity=".75"/>
  <text x="36" y="38" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" fill="#f8fafc">@</text>
  <text x="70" y="27" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="1.5" fill="#f472b6">EMAIL</text>
  <text x="70" y="46" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="750" fill="#f8fafc">m.faizanaslam10@gmail.com</text>
  <circle cx="328" cy="18" r="2" fill="#f472b6">
    <animate attributeName="opacity" values=".25;1;.25" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <line x1="-90" y1="7" x2="40" y2="7" stroke="url(#scan)" stroke-width="2" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="476 0" dur="3.8s" repeatCount="indefinite"/>
  </line>
</svg>
